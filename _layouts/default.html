<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | {{ site.title }}</title>
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- LaTeX 数学公式支持 -->
    <script type="text/javascript" async
      src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script type="text/javascript" async
      src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <script src="{{ '/assets/js/mouse-trail.js' | relative_url }}"></script>
    <script src="{{ '/assets/js/dark-mode.js' | relative_url }}"></script>
</head>
<body class="{{ page.title | slugify }}"> 
    <header>
        <nav class="navbar">
            <a href="/portfolio" class="logo">Xiaoyu Yuan | Academic Portfolio</a>
            <ul>
                <li><a href="/portfolio/"><i class="fa-solid fa-house-chimney"></i> Home</a></li>
                <li><a href="/portfolio/projects/"><i class="fa-solid fa-laptop-code"></i> Projects</a></li>
                <li><a href="/portfolio/publications/"><i class="fa-solid fa-book-open"></i> Publications</a></li>
                <li><a href="/portfolio/contact/"><i class="fa-solid fa-envelope"></i> Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        {{ content }}
    </main>

    <!-- 🌙 悬浮夜间模式按钮 -->
    <button id="dark-mode-toggle">🌙</button>

    <footer>
        <p>© {{ site.time | date: '%Y' }} {{ site.title }}. All rights reserved.</p>
    </footer>
</body>
</html>
