<!DOCTYPE html>
<html lang="en-US">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page.title | default: site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        line-height: 1.6;
        color: #2c3e50;
        background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        min-height: 100vh;
        padding: 40px 20px;
      }

      .wrapper {
        max-width: 900px;
        margin: 0 auto;
        background: white;
        border-radius: 12px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
        overflow: hidden;
      }

      header {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        padding: 60px 40px 40px;
        text-align: center;
      }

      header h1 {
        font-size: 2.5em;
        margin-bottom: 10px;
        font-weight: 700;
      }

      header h1 a {
        color: white;
        text-decoration: none;
      }

      header p {
        font-size: 1.1em;
        opacity: 0.95;
        margin-bottom: 30px;
        font-weight: 500;
      }

      header img {
        width: 120px !important;
        height: 120px !important;
        border: 4px solid white;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        margin-bottom: 30px !important;
      }

      nav {
        margin-top: 30px;
      }

      nav ul {
        list-style: none;
        display: flex;
        justify-content: center;
        gap: 30px;
        flex-wrap: wrap;
      }

      nav li {
        margin: 0;
      }

      nav a {
        color: white;
        text-decoration: none;
        font-weight: 600;
        font-size: 0.95em;
        padding: 8px 16px;
        border-radius: 6px;
        transition: all 0.3s ease;
        opacity: 0.9;
        display: inline-block;
      }

      nav a:hover {
        opacity: 1;
        background: rgba(255, 255, 255, 0.2);
        transform: translateY(-2px);
      }

      section {
        padding: 50px 40px;
      }

      h2 {
        font-size: 1.8em;
        color: #667eea;
        margin-top: 40px;
        margin-bottom: 20px;
        padding-bottom: 10px;
        border-bottom: 3px solid #667eea;
        font-weight: 700;
      }

      section > h2:first-child {
        margin-top: 0;
      }

      h3 {
        font-size: 1.3em;
        color: #2c3e50;
        margin-top: 25px;
        margin-bottom: 15px;
        font-weight: 600;
      }

      ul, ol {
        margin-left: 20px;
        margin-bottom: 20px;
      }

      li {
        margin-bottom: 12px;
        line-height: 1.8;
      }

      strong {
        color: #667eea;
        font-weight: 600;
      }

      a {
        color: #667eea;
        text-decoration: none;
        transition: color 0.3s;
      }

      a:hover {
        color: #764ba2;
        text-decoration: underline;
      }

      hr {
        border: none;
        border-top: 2px solid #f0f0f0;
        margin: 30px 0;
      }

      footer {
        background: #f8f9fa;
        padding: 20px 40px;
        text-align: center;
        color: #7f8c8d;
        font-size: 0.9em;
        border-top: 1px solid #e0e0e0;
      }

      footer small {
        font-size: inherit;
      }

      @media (max-width: 768px) {
        header {
          padding: 40px 20px 30px;
        }

        header h1 {
          font-size: 1.8em;
        }

        section {
          padding: 30px 20px;
        }

        h2 {
          font-size: 1.4em;
        }

        nav ul {
          gap: 15px;
        }

        nav a {
          font-size: 0.9em;
          padding: 6px 12px;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrapper">
      <header>
        <img src="{{ "/assets/images/graduation.jpg" | relative_url }}" alt="Xiaoyu Yuan">
        <h1><a href="{{ "/" | absolute_url }}">{{ site.title | default: "Xiaoyu Yuan" }}</a></h1>
        <p>{{ site.description | default: "AI Researcher" }}</p>
        <nav>
          <ul>
            <li><a href="{{ "/" | relative_url }}">About Me</a></li>
            <li><a href="{{ "/publications.html" | relative_url }}">Publications & Awards</a></li>
            <li><a href="CV_XiaoyuYuan.pdf" target="_blank">Download CV</a></li>
          </ul>
        </nav>
      </header>
      <section>
        {{ content }}
      </section>
      <footer>
        <p><small>© 2026 Xiaoyu Yuan. Hosted on GitHub Pages.</small></p>
      </footer>
    </div>
  </body>
</html>
